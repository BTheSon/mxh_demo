<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Trang chủ - Mạng xã hội</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .post-card { margin-bottom: 20px; }
        .author-name { font-weight: bold; color: #007bff; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">MXH Demo</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-light me-3">Chào, <span th:text="${user.username}">User</span></span>
                <a class="nav-link" href="/followings">Đang theo dõi</a>
                <a class="nav-link btn btn-outline-danger btn-sm text-light" href="/logout">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <!-- Post form -->
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Đăng bài viết mới</h5>
                        <div class="mb-3">
                            <input type="text" id="postTitle" class="form-control mb-2" placeholder="Tiêu đề...">
                            <textarea id="postBody" class="form-control" rows="3" placeholder="Bạn đang nghĩ gì?"></textarea>
                        </div>
                        <button onclick="createPost()" class="btn btn-primary">Đăng bài</button>
                    </div>
                </div>

                <hr>
                <h4 class="mb-3 d-flex justify-content-between align-items-center">
                    <span>Bảng tin</span>
                    <a th:if="${filterUserId != null}" href="/" class="btn btn-sm btn-outline-info">Hiện tất cả</a>
                </h4>
                
                <div id="feedList">
                    <div th:each="post : ${my_feed}" class="card post-card shadow-sm" th:id="'post-' + ${post.id}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <a th:href="@{'/?userId=' + ${post.user_id}}" class="author-name text-decoration-none" th:text="${post.authorName}">Tác giả</a>
                                <small class="text-muted" th:text="${#temporals.format(post.created_at, 'dd/MM/yyyy HH:mm')}"></small>
                            </div>
                            <h5 class="card-title mt-2" th:text="${post.title}">Tiêu đề</h5>
                            <p class="card-text" th:text="${post.body}">Nội dung bài viết...</p>
                            
                            <div th:if="${post.user_id == user.id}" class="mt-2">
                                <button class="btn btn-sm btn-outline-secondary" 
                                        th:data-id="${post.id}"
                                        th:data-title="${post.title}"
                                        th:data-body="${post.body}"
                                        onclick="openEditModal(this)">
                                    Sửa
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Sửa bài viết</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editPostId">
                    <div class="mb-3">
                        <label class="form-label">Tiêu đề</label>
                        <input type="text" id="editPostTitle" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nội dung</label>
                        <textarea id="editPostBody" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="updatePost()">Lưu thay đổi</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const editModal = new bootstrap.Modal(document.getElementById('editModal'));

        function createPost() {
            const title = document.getElementById('postTitle').value;
            const body = document.getElementById('postBody').value;

            if (!title || !body) {
                alert('Vui lòng nhập đầy đủ thông tin');
                return;
            }

            fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, body })
            })
            .then(res => {
                if (res.ok) location.reload();
                else alert('Đã có lỗi xảy ra');
            });
        }

        function openEditModal(btn) {
            const id = btn.getAttribute('data-id');
            const title = btn.getAttribute('data-title');
            const body = btn.getAttribute('data-body');
            document.getElementById('editPostId').value = id;
            document.getElementById('editPostTitle').value = title;
            document.getElementById('editPostBody').value = body;
            editModal.show();
        }

        function updatePost() {
            const id = document.getElementById('editPostId').value;
            const title = document.getElementById('editPostTitle').value;
            const body = document.getElementById('editPostBody').value;

            fetch(`/api/posts/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, body })
            })
            .then(res => {
                if (res.ok) location.reload();
                else alert('Đã có lỗi xảy ra');
            });
        }
    </script>
</body>
</html>
