<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Đang theo dõi - Mạng xã hội</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">MXH Demo</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-light me-3">Chào, <span th:text="${user.username}">User</span></span>
                <a class="nav-link active" href="/followings">Đang theo dõi</a>
                <a class="nav-link btn btn-outline-danger btn-sm text-light" href="/logout">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h3>Tìm kiếm người dùng</h3>
                <div class="input-group mb-3 shadow-sm">
                    <input type="text" id="searchQuery" class="form-control" placeholder="Nhập tên người dùng...">
                    <button class="btn btn-primary" onclick="searchUsers()">Tìm</button>
                </div>
                <div id="searchResults" class="list-group shadow-sm">
                    <!-- Search results here -->
                </div>
            </div>

            <div class="col-md-6">
                <h3>Đang theo dõi</h3>
                <div class="list-group shadow-sm" id="followingsList">
                    <div th:each="f : ${followings}" class="list-group-item d-flex justify-content-between align-items-center">
                        <a th:href="@{'/?userId=' + ${f.id}}" class="text-decoration-none fw-bold" th:text="${f.username}">Tên người dùng</a>
                        <button class="btn btn-sm btn-danger" th:data-id="${f.id}" onclick="unfollow(this)">Bỏ theo dõi</button>
                    </div>
                    <div th:if="${#lists.isEmpty(followings)}" class="list-group-item text-muted">Bạn chưa theo dõi ai.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function searchUsers() {
            const query = document.getElementById('searchQuery').value;
            if (!query) return;

            fetch(`/api/followings?search=${query}`)
                .then(res => res.json())
                .then(users => {
                    const resultsDiv = document.getElementById('searchResults');
                    resultsDiv.innerHTML = '';
                    if (users.length === 0) {
                        resultsDiv.innerHTML = '<div class="list-group-item text-muted">Không tìm thấy người dùng nào.</div>';
                        return;
                    }
                    users.forEach(u => {
                        const item = document.createElement('div');
                        item.className = 'list-group-item d-flex justify-content-between align-items-center';
                        item.innerHTML = `
                            <span>${u.username}</span>
                            <button class="btn btn-sm btn-success" onclick="follow(${u.id})">Theo dõi</button>
                        `;
                        resultsDiv.appendChild(item);
                    });
                });
        }

        function follow(id) {
            fetch(`/api/follow/${id}`, { method: 'POST' })
                .then(res => {
                    if (res.ok) location.reload();
                    else alert('Đã có lỗi xảy ra');
                });
        }

        function unfollow(btn) {
            const id = btn.getAttribute('data-id');
            fetch(`/api/follow/${id}`, { method: 'DELETE' })
                .then(res => {
                    if (res.ok) location.reload();
                    else alert('Đã có lỗi xảy ra');
                });
        }
    </script>
</body>
</html>
